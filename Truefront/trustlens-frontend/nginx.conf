# Redirects PID to writable directory
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Log to stdout/stderr for Cloud Run observability
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Redirect temp paths to /tmp (Writable)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA Routing: Required for React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API Proxy
        location /api/ {
            proxy_pass https://resume-backend-948277799081.us-central1.run.app/api/v1/;
            proxy_set_header Host resume-backend-948277799081.us-central1.run.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
    }
}
