<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 841.9 595.3">
  <defs>
    <style>
      .react-atom-circle {
        fill: none;
        stroke: #61dafb;
        stroke-width: 2;
      }
      .react-atom-dot {
        fill: #61dafb;
      }
    </style>
  </defs>
  
  <!-- Main atom with orbiting electrons -->
  <g transform="translate(420.95 297.65)">
    <!-- Nucleus (center dot) -->
    <circle class="react-atom-dot" r="6" />
    
    <!-- First orbit -->
    <ellipse class="react-atom-circle" rx="79.1" ry="79.1" />
    <circle class="react-atom-dot" r="3" cx="79.1" cy="0" />
    
    <!-- Second orbit (rotated) -->
    <g transform="rotate(60)">
      <ellipse class="react-atom-circle" rx="79.1" ry="79.1" />
      <circle class="react-atom-dot" r="3" cx="79.1" cy="0" />
    </g>
    
    <!-- Third orbit (rotated) -->
    <g transform="rotate(120)">
      <ellipse class="react-atom-circle" rx="79.1" ry="79.1" />
      <circle class="react-atom-dot" r="3" cx="79.1" cy="0" />
    </g>
  </g>
  
  <!-- Text label -->
  <text x="420.95" y="550" text-anchor="middle" font-size="24" font-weight="bold" fill="#61dafb" font-family="Arial, sans-serif">
    React
  </text>
</svg>
